services:

  # ================================================================
  # LANDING PAGE  –  porta 80 interna, servita via Nginx su :443
  # ================================================================
  landing:
    build: ./landing
    container_name: beach-landing
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped

  # ================================================================
  # MYSQL CONDIVISO
  # Crea entrambi i database tramite lo script mysql-init/01_init.sh
  # ================================================================
  mysql:
    image: mysql:8.0
    container_name: beach-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      BEACHBOOKING_DB_PASSWORD: ${BEACHBOOKING_DB_PASSWORD}
      BEACHDELIVERY_DB_PASSWORD: ${BEACHDELIVERY_DB_PASSWORD}
    command: --default-authentication-plugin=mysql_native_password
    # Porta 33006 esposta su tutte le interfacce per accesso remoto
    # (UFW lascia passare solo connessioni autorizzate)
    ports:
      - "33006:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - beach-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ================================================================
  # BEACH BOOKING  –  Frontend: porta 82  |  Backend: interno 8080
  # ================================================================
  beachbooking-backend:
    build: ./beachbooking/beachbooking-backemd
    container_name: beachbooking-app
    # hostname "backend" serve per mantenere la compatibilità con nginx.conf
    # del frontend che fa proxy verso http://backend:8080
    hostname: backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/beach_booking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: beach
      SPRING_DATASOURCE_PASSWORD: ${BEACHBOOKING_DB_PASSWORD}
      JWT_SECRET: ${BEACHBOOKING_JWT_SECRET}
      SPRING_SQL_INIT_MODE: always
      SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION: "true"
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      PAYPAL_BASE_URL: ${PAYPAL_BASE_URL:-https://api-m.paypal.com}
    expose:
      - "8080"
    networks:
      - beach-network
    volumes:
      - beachbooking_uploads:/app/uploads
    restart: unless-stopped

  beachbooking-frontend:
    build:
      context: ./beachbooking/beachbooking-frontend
      args:
        VITE_PAYPAL_CLIENT_ID: ${VITE_PAYPAL_CLIENT_ID}
    container_name: beachbooking-frontend
    depends_on:
      - beachbooking-backend
    ports:
      - "127.0.0.1:82:80"
    networks:
      - beach-network
    restart: unless-stopped

  # ================================================================
  # BEACH DELIVERY  –  Frontend: porta 81  |  Backend: porta 8081
  # ================================================================
  beachdelivery-backend:
    build:
      context: ./beachdelivery/bd-be
      dockerfile: Dockerfile
    container_name: beachdelivery-api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/beachdelivery?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull
      SPRING_DATASOURCE_USERNAME: bdapp
      SPRING_DATASOURCE_PASSWORD: ${BEACHDELIVERY_DB_PASSWORD}
      JWT_SECRET: ${BEACHDELIVERY_JWT_SECRET}
      JWT_EXPIRATION: 86400000
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.example.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
    ports:
      - "127.0.0.1:8081:8081"
    networks:
      - beach-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/v3/api-docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  beachdelivery-frontend:
    build:
      context: ./beachdelivery/bd-fe
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${BEACHDELIVERY_API_URL}
    container_name: beachdelivery-fe
    ports:
      - "127.0.0.1:81:80"
    restart: unless-stopped
    depends_on:
      - beachdelivery-backend

networks:
  beach-network:
    name: beach-network
    driver: bridge

volumes:
  mysql_data:
  beachbooking_uploads:
